runtime: python312
instance_class: F1

entrypoint: gunicorn -b :$PORT app:app

automatic_scaling:
  min_instances: 0
  max_instances: 3
  target_throughput_utilization: 0.5
  max_concurrent_requests: 20
  max_pending_latency: 30ms

beta_settings:
  cloud_sql_instances: "kumori-404602:us-central1:kumori"

env_variables:
  BASE_URL: "https://bris.kr"
  GAE_ENV: "standard"

handlers:
  - url: /favicon\.ico
    static_files: static/favicon.ico
    upload: static/favicon\.ico
    secure: always
  - url: /.*
    script: auto
    secure: always
    redirect_http_response_code: 301