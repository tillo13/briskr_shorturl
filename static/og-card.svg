<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4ade80"/>
      <stop offset="100%" style="stop-color:#22d3ee"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Decorative speed lines -->
  <line x1="80" y1="200" x2="350" y2="200" stroke="#4ade80" stroke-width="3" opacity="0.3"/>
  <line x1="120" y1="240" x2="420" y2="240" stroke="#4ade80" stroke-width="2" opacity="0.2"/>
  <line x1="60" y1="280" x2="300" y2="280" stroke="#4ade80" stroke-width="2" opacity="0.15"/>
  <line x1="850" y1="350" x2="1140" y2="350" stroke="#22d3ee" stroke-width="3" opacity="0.3"/>
  <line x1="800" y1="390" x2="1100" y2="390" stroke="#22d3ee" stroke-width="2" opacity="0.2"/>
  <line x1="900" y1="430" x2="1160" y2="430" stroke="#22d3ee" stroke-width="2" opacity="0.15"/>
  <!-- Chain link icon -->
  <g transform="translate(540, 160)" opacity="0.15">
    <path d="M0,40 Q0,0 40,0 L80,0 Q120,0 120,40 Q120,80 80,80 L40,80 Q0,80 0,40Z" fill="none" stroke="#4ade80" stroke-width="6"/>
    <path d="M60,0 Q60,-40 100,-40 L140,-40 Q180,-40 180,0 Q180,40 140,40 L100,40 Q60,40 60,0Z" fill="none" stroke="#22d3ee" stroke-width="6"/>
  </g>
  <!-- Title -->
  <text x="600" y="340" font-family="-apple-system, system-ui, sans-serif" font-size="96" font-weight="bold" fill="white" text-anchor="middle">Briskr</text>
  <!-- Accent bar -->
  <rect x="480" y="365" width="240" height="4" rx="2" fill="url(#accent)"/>
  <!-- Tagline -->
  <text x="600" y="420" font-family="monospace" font-size="28" fill="#4ade80" text-anchor="middle">Free URL Shortener</text>
  <!-- Domain -->
  <text x="600" y="470" font-family="monospace" font-size="22" fill="#666" text-anchor="middle">bris.kr</text>
  <!-- Bottom tag -->
  <text x="600" y="560" font-family="-apple-system, system-ui, sans-serif" font-size="18" fill="#444" text-anchor="middle">No tracking. No ads. Just fast links.</text>
</svg>
